name: Build and Test

# Forgejo Actions workflow for infrastructure-toolkit.
#
# Adapted from the canonical lifecycle-manager template
# (lifecycle-manager/.forgejo/workflows/build-test.yml).
# Generated by `lcm migrate-ci`.
#
# Why `needs:` and not `workflow_run:` — Forgejo Actions v6 doesn't fully
# support the workflow_run trigger; workflows that reference it never enqueue.

on:
  push:
    branches: [ main, develop, 'feat/**', 'fix/**', 'chore/**', 'ci/**' ]
  pull_request:
    branches: [ main, develop ]

# Avoid duplicate runs when push + pull_request fire for the same SHA.
# Cancel older in-progress runs on the same ref when a new one arrives.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]

    steps:
    - uses: actions/checkout@v4

    - name: Configure git identity
      run: |
        git config --global user.email "ci@infrastructure-toolkit.test"
        git config --global user.name "infrastructure-toolkit CI"
        git config --global init.defaultBranch main

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install package
      working-directory: core/backend
      run: |
        python -m pip install --upgrade pip
        pip install -e .
        pip install pytest pyyaml rich click pydantic httpx

    - name: Run pytest (gracefully skips if no tests)
      working-directory: core/backend
      run: |
        if [ -d tests ] && find tests -name '*.py' -not -path '*__pycache__*' | grep -q .; then
          pytest tests/ -v --tb=short
        else
          echo "No test files found in tests/ — skipping pytest"
        fi
