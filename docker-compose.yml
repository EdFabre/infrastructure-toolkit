---
# Infrastructure Toolkit - Production Docker Compose
# Cloud Native Pattern: Simple containers, external proxy handles routing
#
# Usage:
#   docker-compose build
#   docker-compose up -d
#
# Note: Configure your reverse proxy (Nginx/Traefik/Caddy) to:
#   - Route / to frontend container (port 8080)
#   - Route /api to backend container (port 8000)

version: "3.3"

services:
  backend:
    build:
      context: ./core/backend
      dockerfile: Dockerfile
    image: infra-toolkit-backend:latest
    container_name: infra-toolkit-backend
    environment:
      - TZ=America/New_York
      - PYTHONUNBUFFERED=1
    volumes:
      # Persist database
      - ./data:/app/data
      # Mount config (read-only)
      - /mnt/tank/faststorage/general/repo/ai-config/config.yaml:/app/config.yaml:ro
      # Mount SSH keys for server access (read-only)
      - /root/.ssh:/root/.ssh:ro
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build:
      context: ./core/frontend
      dockerfile: Dockerfile
    image: infra-toolkit-frontend:latest
    container_name: infra-toolkit-frontend
    environment:
      - TZ=America/New_York
    ports:
      - "8080:80"
    restart: unless-stopped
